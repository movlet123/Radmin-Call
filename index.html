<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radmin Call | Download</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #00ff88;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin: 40px 0;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .header p {
            color: var(--accent);
            font-weight: bold;
            margin-top: 5px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .version-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .version-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .info .date {
            font-size: 0.7rem;
            color: #777;
            display: block;
            margin-bottom: 5px;
        }

        .info .v-num {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .download-btn {
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .empty-message {
            text-align: center;
            color: #555;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>RADMIN CALL</h1>
        <p>for Windows</p>
    </div>

    <div class="container" id="app">
        </div>

    <script>
        // ТВОЯ БАЗА ДАННЫХ
        // Чтобы выложить программу, просто добавь строчку в этот список:
        let versions = [
            // Пример: {v: "1.0.0", date: "12 Апреля 2026", link: "ССЫЛКА_НА_ФАЙЛ"},
        ];

        function render() {
            const container = document.getElementById('app');
            
            // Если версий нет, показываем сообщение
            if (versions.length === 0) {
                container.innerHTML = '<div class="empty-message">Пока нет доступных версий для скачивания.</div>';
                return;
            }

            // Если версии есть, рисуем карточки
            container.innerHTML = versions.map(item => `
                <div class="version-card">
                    <div class="info">
                        <span class="date">Опубликовано: ${item.date}</span>
                        <span class="v-num">Версия: ${item.v}</span>
                    </div>
                    <a href="${item.link}" class="download-btn">Скачать</a>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
