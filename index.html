<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radmin Call | Download</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

body {
    background: #0a0a0a;
    color: white;
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

.header {
    text-align: center;
    margin: 40px 0;
}

.header h1 {
    font-size: 3rem;
    font-weight: 900;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.header p {
    color: #00ff88;
    font-weight: 700;
    margin-top: 5px;
    font-size: 1.2rem;
    letter-spacing: 1px;
}

#app {
    width: 100%;
    max-width: 550px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    flex-grow: 1;
}

.card {
    background: #161616;
    padding: 20px 25px;
    border-radius: 12px;
    border: 1px solid #222;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-3px);
    border-color: #00ff88;
    box-shadow: 0 5px 20px rgba(0, 255, 136, 0.05);
}

.card-info {
    text-align: left;
}

.card-title {
    margin: 0;
    font-size: 1.5rem;
    font-weight: 700;
}

.card-date {
    margin: 0 0 5px 0;
    font-size: 0.8rem;
    color: #888;
}

.download-btn {
    background: #00ff88;
    color: #000;
    padding: 12px 24px;
    display: inline-block;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9rem;
    text-transform: uppercase;
    transition: all 0.3s ease;
    box-shadow: 0 0 10px rgba(0, 255, 136, 0.1);
}

.download-btn:hover {
    background: #00cc6e;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
    transform: scale(1.05);
}

.no-file {
    color: #555;
    font-weight: bold;
    padding: 12px 24px;
    background: #111;
    border-radius: 8px;
    border: 1px dashed #333;
}

.loading {
    color: #888;
    font-size: 1.2rem;
    text-align: center;
    margin-top: 20px;
}

.footer {
    margin-top: 40px;
    margin-bottom: 20px;
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.social-link {
    color: #888;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid #333;
    transition: all 0.3s ease;
    background: #111;
}

.social-link:hover {
    color: #00ff88;
    border-color: #00ff88;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 255, 136, 0.1);
}
</style>
</head>

<body>

<div class="header">
    <h1>RADMIN CALL</h1>
    <p>for Windows</p>
</div>

<div id="app"><div class="loading">Загрузка версий...</div></div>

<div class="footer">
    <a href="https://www.youtube.com/@S-M-U-C-K" target="_blank" class="social-link">YouTube</a>
    <a href="https://github.com/movlet123" target="_blank" class="social-link">GitHub</a>
    <a href="https://www.tiktok.com/@mobeha_rbx?_r=1&_t=ZP-95TDtXaP0Mp" target="_blank" class="social-link">TikTok</a>
</div>

<script>
const USER = "movlet123";
const REPO = "Radmin-Call";

async function load() {
    try {
        const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/releases`);
        const data = await res.json();

        let html = "";

        if (data.length === 0) {
            html = "<div class='loading'>Релизов пока нет</div>";
        } else {
            data.forEach(r => {
                const zip = r.assets.find(a => a.name.endsWith(".zip"));

                html += `
                <div class="card">
                    <div class="card-info">
                        <p class="card-date">Опубликовано: ${new Date(r.published_at).toLocaleDateString()}</p>
                        <h3 class="card-title">Версия: ${r.tag_name}</h3>
                    </div>
                    ${zip ? `<a href="${zip.browser_download_url}" class="download-btn">СКАЧАТЬ</a>` : `<div class="no-file">Нет файла</div>`}
                </div>
                `;
            });
        }

        document.getElementById("app").innerHTML = html;
    } catch (error) {
        document.getElementById("app").innerHTML = "<div class='loading'>Ошибка загрузки данных</div>";
    }
}

load();
</script>

</body>
</html>
