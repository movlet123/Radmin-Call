<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="Logo.png" type="image/png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radmin Call</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

body {
    background: #0a0a0a;
    color: white;
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.header {
    text-align: center;
    margin: 40px 0;
}

.logo {
    width: 90px;
    margin-bottom: 10px;
}

.header h1 {
    font-size: 3rem;
    font-weight: 900;
    margin: 0;
}

.header p {
    color: #00ff88;
    font-weight: 700;
}

#app {
    width: 100%;
    max-width: 550px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* КАРТОЧКИ */
.card {
    position: relative;
    background: #161616;
    padding: 20px 25px;
    border-radius: 12px;
    border: 1px solid #222;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-3px);
    border-color: #00ff88;
}

/* ❗ БЛОКИРУЕМ КЛИКИ У ПОСЛЕДНЕЙ */
.card.fade {
    pointer-events: none;
}

/* убираем hover эффект у неё */
.card.fade:hover {
    transform: none;
    border-color: #222;
}

/* ГРАДИЕНТ */
.card.fade::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 100%;
    border-radius: 12px;
    background: linear-gradient(
        to bottom,
        rgba(10,10,10,0) 0%,
        rgba(10,10,10,0.6) 60%,
        rgba(10,10,10,1) 100%
    );
}

/* ТЕКСТ */
.card-title {
    font-size: 1.5rem;
    font-weight: 700;
}

.card-date {
    font-size: 0.8rem;
    color: #888;
}

.download-btn {
    background: #00ff88;
    color: #000;
    padding: 12px 24px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    transition: all 0.25s ease;
    box-shadow: 0 0 0 rgba(0, 255, 136, 0);
}

/* 🔥 ВОТ HOVER */
.download-btn:hover {
    background: #00cc6e;
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
}
/* КНОПКА РАЗВЕРНУТЬ */
.toggle-btn {
    text-align: center;
    cursor: pointer;
    color: #aaa;
    margin-top: 10px;
}

.toggle-btn:hover {
    color: #00ff88;
}

/* ФУТЕР */
.footer {
    margin-top: 40px;
    display: flex;
    gap: 20px;
}

.social-link {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #888;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #111;
    transition: 0.3s;
}

.social-link img {
    width: 20px;
}

.social-link:hover {
    color: #00ff88;
    border-color: #00ff88;
}
</style>
</head>

<body>

<div class="header">
    <img src="Logo.png" class="logo">
    <h1>RADMIN CALL</h1>
    <p>for Windows</p>
</div>

<div id="app">Загрузка...</div>

<div class="footer">
    <a href="https://www.youtube.com/@S-M-U-C-K" target="_blank" class="social-link">
        <img src="youtube.png"> YouTube
    </a>
    <a href="https://github.com/movlet123" target="_blank" class="social-link">
        <img src="github.png"> GitHub
    </a>
    <a href="https://www.tiktok.com/@mobeha_rbx" target="_blank" class="social-link">
        <img src="tiktok.png"> TikTok
    </a>
</div>

<script>
const USER = "movlet123";
const REPO = "Radmin-Call";

let allReleases = [];
let expanded = false;

function render() {
    const app = document.getElementById("app");

    let html = "";

    const visible = expanded ? allReleases : allReleases.slice(0, 4);

    visible.forEach((r, i) => {
        const zip = r.assets.find(a => a.name.endsWith(".zip"));

        const isLast = (!expanded && i === visible.length - 1);
        const cls = isLast ? "card fade" : "card";

        html += `
        <div class="${cls}">
            <div>
                <div class="card-date">${new Date(r.published_at).toLocaleDateString()}</div>
                <div class="card-title">${r.tag_name}</div>
            </div>
            ${zip 
                ? `<a href="${zip.browser_download_url}" class="download-btn">СКАЧАТЬ</a>` 
                : `<div>Нет файла</div>`
            }
        </div>
        `;
    });

    if (allReleases.length > 4) {
        html += `
        <div class="toggle-btn" onclick="toggle()">
            ${expanded ? "закрыть ↑" : "развернуть ↓"}
        </div>
        `;
    }

    app.innerHTML = html;
}

function toggle() {
    expanded = !expanded;
    render();
}

async function load() {
    const app = document.getElementById("app");

    try {
        const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/releases?per_page=10`);

        if (!res.ok) throw new Error();

        const data = await res.json();

        if (!Array.isArray(data)) {
            app.innerHTML = "<div>Лимит GitHub 😢</div>";
            return;
        }

        if (data.length === 0) {
            app.innerHTML = "<div>Релизов нет</div>";
            return;
        }

        allReleases = data;
        render();

    } catch (err) {
        app.innerHTML = "Ошибка загрузки";
    }
}

setTimeout(load, 300);
</script>

</body>
</html>
