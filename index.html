<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radmin Call | Download</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #00ff88;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin: 40px 0;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .header p {
            color: var(--accent);
            font-weight: bold;
            margin-top: 5px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .version-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .version-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .info .date {
            font-size: 0.7rem;
            color: #777;
            display: block;
            margin-bottom: 5px;
        }

        .info .v-num {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .download-btn {
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .admin-panel {
            margin-top: 50px;
            padding: 15px;
            background: #111;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #333;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>RADMIN CALL</h1>
        <p>for Windows</p>
    </div>

    <div class="container" id="app">
        </div>

    <div class="admin-panel">
        <h3 style="text-align:center">Админ-панель</h3>
        <input type="text" id="verInput" placeholder="Версия (0.0.1)">
        <input type="text" id="linkInput" placeholder="Ссылка на файл">
        <button onclick="addVersion()">Опубликовать</button>
    </div>

    <script>
        // Функция для отображения (имитация работы с базой)
        let versions = [
            {v: "0.0.3", date: "19 Ноября 2026, 18:30", link: "#"},
            {v: "0.0.2", date: "Октябрь 2026, 15:30", link: "#"}
        ];

        function render() {
            const container = document.getElementById('app');
            container.innerHTML = versions.map(item => `
                <div class="version-card">
                    <div class="info">
                        <span class="date">Опубликовано: ${item.date}</span>
                        <span class="v-num">Версия: ${item.v}</span>
                    </div>
                    <a href="${item.link}" class="download-btn">Скачать</a>
                </div>
            `).join('');
        }

        function addVersion() {
            const v = document.getElementById('verInput').value;
            const link = document.getElementById('linkInput').value;
            const now = new Date();
            const dateStr = now.toLocaleString('ru-RU');

            if(v && link) {
                versions.unshift({v: v, date: dateStr, link: link});
                render();
                alert('Версия добавлена! (Пока только в браузере)');
            }
        }

        render();
    </script>
</body>
</html>
