        to bottom,

    );

<body>

<img id="themeToggle" src="sun.png"
style="position:fixed;top:15px;right:15px;width:34px;cursor:pointer;">

<div class="header">
    <img src="Logo.png" class="logo">
    <h1>RADMIN CALL</h1>
    <p>for Windows</p>
</div>

<div id="app">Загрузка...</div>

<div class="footer">
    <a href="https://www.youtube.com/@S-M-U-C-K" target="_blank" class="social-link">
        <img id="ytIcon" src="youtube.png"> YouTube
    </a>

    <a href="https://github.com/movlet123" target="_blank" class="social-link">
        <img id="ghIcon" src="github.png"> GitHub
    </a>

    <a href="https://www.tiktok.com/@mobeha_rbx" target="_blank" class="social-link">
        <img id="ttIcon" src="tiktok.png"> TikTok
    </a>

    <a href="https://www.donationalerts.com/r/shmuck" target="_blank" class="social-link">
        <img id="donIcon" src="donate.png"> Donate
    </a>
</div>

<script>
const USER = "movlet123";
const REPO = "Radmin-Call";

let allReleases = [];
let expanded = false;

const toggleBtn = document.getElementById("themeToggle");

function setTheme(theme) {
    const light = theme === "light";

    document.body.classList.toggle("light", light);
    toggleBtn.src = light ? "moon.png" : "sun.png";

    document.getElementById("ytIcon").src = light ? "youtubebl.png" : "youtube.png";
    document.getElementById("ghIcon").src = light ? "githubbl.png" : "github.png";
    document.getElementById("ttIcon").src = light ? "tiktokbl.png" : "tiktok.png";
    document.getElementById("donIcon").src = light ? "donatebl.png" : "donate.png";

    localStorage.setItem("theme", theme);
}

toggleBtn.onclick = () => {
    const isLight = document.body.classList.contains("light");
    setTheme(isLight ? "dark" : "light");
};

function render() {
    const app = document.getElementById("app");

    const visible = expanded ? allReleases : allReleases.slice(0, 4);

    let html = "";

    visible.forEach((r, i) => {
        const zip = r.assets.find(a => a.name.endsWith(".zip"));
        const isLast = (!expanded && i === visible.length - 1);
        const cls = isLast ? "card fade" : "card";

        html += `
        <div class="${cls}">
            <div>
                <div class="card-date">${new Date(r.published_at).toLocaleDateString()}</div>
                <div class="card-title">${r.tag_name}</div>
            </div>
            ${zip 
                ? `<a href="${zip.browser_download_url}" class="download-btn">СКАЧАТЬ</a>` 
                : `<div>Нет файла</div>`
            }
        </div>
        `;
    });

    if (allReleases.length > 4) {
        html += `
        <div class="toggle-btn" onclick="toggle()">
            ${expanded ? "закрыть ↑" : "развернуть ↓"}
        </div>
        `;
    }

    app.innerHTML = html;
}

function toggle() {
    expanded = !expanded;
    render();
}

async function load() {
    const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/releases?per_page=10`);
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) return;

    allReleases = data;
    render();
}

setTheme(localStorage.getItem("theme") || "dark");
setTimeout(load, 300);
</script>
