<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radmin Call | Download</title>

<style>
:root {
    --bg: #0a0a0a;
    --card: #161616;
    --accent: #00ff88;
    --text: #ffffff;
}

body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.header {
    text-align: center;
    margin: 40px 0;
}

.header h1 {
    font-size: 2.5rem;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 3px;
}

.header p {
    color: var(--accent);
    font-weight: bold;
    margin-top: 5px;
}

.container {
    width: 100%;
    max-width: 500px;
}

.version-card {
    background: var(--card);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid #222;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}

.version-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
}

.info .date {
    font-size: 0.7rem;
    color: #777;
    display: block;
    margin-bottom: 5px;
}

.info .v-num {
    font-size: 1.2rem;
    font-weight: bold;
}

.file-name {
    font-size: 0.8rem;
    color: #999;
}

.download-btn {
    background: var(--accent);
    color: #000;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 0.9rem;
    text-transform: uppercase;
}

.empty-message {
    text-align: center;
    color: #555;
    margin-top: 50px;
}
</style>
</head>

<body>

<div class="header">
    <h1>RADMIN CALL</h1>
    <p>for Windows</p>
</div>

<div class="container" id="app">
    <div class="empty-message">Загрузка...</div>
</div>

<script>
const USER = "USERNAME"; // ← сюда ник
const REPO = "REPO";     // ← сюда репо

async function loadVersions() {
    const container = document.getElementById('app');

    try {
        const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/releases`);
        const data = await res.json();

        if (!data.length) {
            container.innerHTML = '<div class="empty-message">Нет релизов</div>';
            return;
        }

        const versions = data.map(release => {

            // 🔍 ищем ZIP файл
            const zipFile = release.assets.find(a => a.name.endsWith(".zip"));

            return {
                v: release.tag_name,
                date: new Date(release.published_at).toLocaleDateString(),
                link: zipFile ? zipFile.browser_download_url : null,
                name: zipFile ? zipFile.name : "Нет ZIP файла"
            };
        });

        container.innerHTML = versions.map(item => `
            <div class="version-card">
                <div class="info">
                    <span class="date">Опубликовано: ${item.date}</span>
                    <span class="v-num">Версия: ${item.v}</span>
                    <span class="file-name">${item.name}</span>
                </div>
                ${
                    item.link 
                    ? `<a href="${item.link}" class="download-btn">Скачать</a>`
                    : `<span style="color:red;">Нет файла</span>`
                }
            </div>
        `).join('');

    } catch (e) {
        container.innerHTML = '<div class="empty-message">Ошибка загрузки</div>';
    }
}

loadVersions();
</script>

</body>
</html>
